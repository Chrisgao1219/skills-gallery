function render(catFilter,searchText){
  const c=document.getElementById("sections"),s=searchText.toLowerCase().trim();
  let h="",t=0,d=0;
  S.forEach(cat=>{
    if(catFilter!=="all"&&cat.id!==catFilter)return;
    const f=cat.skills.filter(([n,d])=>n.toLowerCase().includes(s)||d.includes(searchText));
    if(!f.length)return;t+=f.length;
    const src=cat.source?` <small style="opacity:.5;font-weight:400;font-size:11px">${cat.source}</small>`:"";
    h+=`<section class="section"><div class="section-header"><span class="section-icon">${cat.icon}</span><h2 class="section-title">${cat.title}</h2>${src}<span class="section-count">${f.length}</span></div><div class="grid">`;
    f.forEach(([n,dc])=>{h+=`<div class="card" style="animation-delay:${d}s" onclick="copySkill(this,'${n.replace(/'/g,"\\'")}')" title="点击复制"><div class="card-name">${n}<span class="card-copy-icon">📋</span></div><div class="card-desc">${dc}</div><span class="card-tag ${cat.tag}">${cat.title}</span></div>`;d+=.015});
    h+=`</div></section>`;
  });
  c.innerHTML=t?h:`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-text">没有匹配的Skill，试试其他关键词</div></div>`;
  document.getElementById("resultHint").textContent=t?`共 ${t} 个`:"";
  document.getElementById("totalCount").textContent=t||278;
}
function copySkill(el,name){
  navigator.clipboard.writeText(name).then(()=>{el.classList.add("copied");showToast(`已复制：${name}`);setTimeout(()=>el.classList.remove("copied"),1500)}).catch(()=>showToast("复制失败"));
}
let tt;
function showToast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),2000)}
const si=document.getElementById("search"),sc=document.getElementById("searchClear"),ft=document.querySelectorAll(".filter-tab");let cc="all";
si.addEventListener("input",()=>{const v=si.value;sc.classList.toggle("visible",v.length>0);render(cc,v)});
sc.addEventListener("click",()=>{si.value="";sc.classList.remove("visible");render(cc,"");si.focus()});
ft.forEach(t=>{t.addEventListener("click",()=>{ft.forEach(x=>x.classList.remove("active"));t.classList.add("active");cc=t.dataset.cat;render(cc,si.value)})});
const btt=document.getElementById("btt");window.addEventListener("scroll",()=>btt.classList.toggle("visible",scrollY>500));btt.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
document.getElementById("btnCopyUrl").addEventListener("click",()=>{navigator.clipboard.writeText(location.href).then(()=>showToast("链接已复制，可粘贴分享给同事"))});
document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();si.focus()}if(e.key==="Escape"){si.value="";sc.classList.remove("visible");render(cc,"")}});
render("all","");
</script>
